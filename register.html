<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hesap Oluştur — Okul Bilgi Panosu</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="auth-card glass-panel">
    <h1>Hesap Oluştur</h1>
    <p>Okulunuz için ücretsiz pano hesabı oluşturun.</p>

    <div class="form-error" id="error"></div>

    <form id="register-form">
      <div class="form-row">
        <label for="school_name">Okul Adı *</label>
        <input type="text" id="school_name" required placeholder="Şanlıurfa BİLSEM" />
      </div>
      <div class="form-row">
        <label for="slug">Web Adresi *</label>
        <div class="slug-input">
          <span class="slug-prefix">.../</span>
          <input type="text" id="slug" required pattern="[a-z0-9][a-z0-9-]*[a-z0-9]"
                 placeholder="sanliurfa-bilsem" />
        </div>
        <small style="color:var(--text-secondary);">
          Sadece küçük harf, rakam ve tire (-). Pano adresi olarak kullanılır.
        </small>
      </div>
      <div class="form-row">
        <label for="email">E-posta *</label>
        <input type="email" id="email" autocomplete="email" required />
      </div>
      <div class="form-row">
        <label for="password">Parola *</label>
        <input type="password" id="password" autocomplete="new-password" required minlength="8" />
        <small style="color:var(--text-secondary);font-size:0.8rem;">En az 8 karakter.</small>
      </div>
      <button class="btn" type="submit" id="submit-btn">Hesap Oluştur</button>
    </form>

    <p class="auth-meta">
      Hesabın var mı? <a href="/giris">Giriş Yap</a>
    </p>
    <p class="auth-back">
      <a href="/">← Ana sayfa</a>
    </p>
  </div>

  <script type="module" src="/src/register.js"></script>
</body>
</html>
