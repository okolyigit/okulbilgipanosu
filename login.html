<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş Yap — Okul Bilgi Panosu</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="auth-card glass-panel">
    <h1>Giriş Yap</h1>
    <p>Okul hesabınızla giriş yapın.</p>

    <div class="form-error" id="error"></div>

    <form id="login-form">
      <div class="form-row">
        <label for="email">E-posta</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
      </div>
      <div class="form-row">
        <label for="password">Parola</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button class="btn" type="submit" id="submit-btn">Giriş Yap</button>
    </form>

    <p class="auth-meta">
      Hesabın yok mu? <a href="/kayit">Hesap Oluştur</a>
    </p>
    <p class="auth-back">
      <a href="/">← Ana sayfa</a>
    </p>
  </div>

  <script type="module" src="/src/login.js"></script>
</body>
</html>
